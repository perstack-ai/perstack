name: Issue Bot
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
jobs:
  respond:
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && !github.event.comment.user.login.endsWith('[bot]'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Issue Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          npx perstack run github-issue-bot "Answer issue #$ISSUE_NUMBER"

